<header class="header">
    <div class="header-container">
        <div class="logo-section">
            <h1 class="logo">Sensibolt</h1>
        </div>

        <!-- Hamburger Menu Button -->
        <button class="hamburger" [class.open]="isMenuOpen()" (click)="toggleMenu()" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Navigation -->
        <nav class="navbar" [class.open]="isMenuOpen()">
            <ul class="nav-menu">
                @for (item of navItems(); track item.route) {
                <li class="nav-item">
                    <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }"
                        class="nav-link" (click)="closeMenu()">
                        @if (item.icon) {
                        <i [class]="'pi ' + item.icon"></i>
                        }
                        <span class="nav-label">{{ item.label }}</span>
                    </a>
                </li>
                }
            </ul>
        </nav>

        <!-- Account Dropdown (Dashboard Only) -->
        <div class="account-menu">
            <button class="account-toggle" (click)="toggleUserMenu()" aria-label="Toggle account menu">
                <i class="pi pi-user"></i>
                <span>Account</span>
            </button>
            <nav class="user-menu" [class.open]="showUserMenu()">
                <ul class="user-menu-items">
                    <li><a href="javascript:void(0)" (click)="logout()" class="menu-item">
                            <i class="pi pi-sign-out"></i>
                            <span>Sign Out</span>
                        </a></li>
                    <li><a href="javascript:void(0)" (click)="clearCache()" class="menu-item">
                            <i class="pi pi-trash"></i>
                            <span>Clear Cache</span>
                        </a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>
